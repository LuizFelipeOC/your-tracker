name: your_tracker
description: Your app of tracker brazilian packages

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_modular: ^6.3.2
  lottie: ^2.6.0
  result_dart: ^1.1.0
  uno: ^1.1.9
  shared_preferences: ^2.2.2
  firebase_core: ^2.21.0
  firebase_crashlytics: ^3.4.3
  font_awesome_flutter: ^10.6.0
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  mocktail: ^1.0.1
  faker: ^2.1.0
  sqflite_common_ffi:



flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lotties/


  fonts:
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/Ubuntu-Bold.ttf
        - asset: assets/fonts/Ubuntu-Medium.ttf
        - asset: assets/fonts/Ubuntu-Regular.ttf
